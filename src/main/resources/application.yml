server:
  port: 8090

spring:
  application:
    name: hogar360-users-ms
  datasource:
    url: jdbc:mysql://localhost:3306/hogar360_users
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    database: MYSQL
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui
    enabled: true